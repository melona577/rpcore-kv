name: KV Cache 생성 [E2B 전담]

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: '스토리 ID'
        required: true

env:
  CACHE_TYPE_K: q8_0
  CACHE_TYPE_V: q4_0
  KV_VERSION: "7"
  N_KEEP: 512
  ROPE_FREQ_BASE: 500000
  MODEL_ID: gemma-3n-e2b-reasoning
  N_CTX: 8192

jobs:
  generate-kv-e2b:
    name: "KV 생성 [gemma-3n-e2b-reasoning]"
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # ── 1. kv-prefill 빌드 (베이스 워크플로우와 동일) ────────
      - name: kv-prefill 캐시 확인
        id: cache-prefill
        uses: actions/cache@v4
        with:
          path: llama_build/bin/kv-prefill
          key: kv-prefill-${{ secrets.LLAMA_CPP_HASH }}-ubuntu-static

      - name: llama.cpp 클론 및 kv-prefill 빌드
        if: steps.cache-prefill.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ggml-org/llama.cpp llama_src
          cd llama_src
          git checkout ${{ secrets.LLAMA_CPP_HASH }}
          git log --oneline -1

          mkdir -p examples/kv-prefill
          cat << 'EOF' > examples/kv-prefill/kv-prefill.cpp
          #include "llama.h"
          #include <cstdio>
          #include <cstring>
          #include <fstream>
          #include <sstream>
          #include <string>
          #include <vector>

          int main(int argc, char** argv) {
            if (argc < 5) {
              fprintf(stderr,
                "Usage: kv-prefill <model> <prompt_file> <output_bin>"
                " <n_ctx> [rope_freq_base] [cache_type_k] [cache_type_v] [n_keep]\n");
              return 1;
            }
            const char* model_path     = argv[1];
            const char* prompt_file    = argv[2];
            const char* output_bin     = argv[3];
            int         n_ctx          = atoi(argv[4]);
            float       rope_freq_base = argc > 5 ? atof(argv[5]) : 10000.0f;
            const char* ck             = argc > 6 ? argv[6] : "q8_0";
            const char* cv             = argc > 7 ? argv[7] : "q4_0";
            int         n_keep         = argc > 8 ? atoi(argv[8]) : 512;

            std::ifstream pf(prompt_file);
            if (!pf.is_open()) { fprintf(stderr, "❌ 프롬프트 파일 열기 실패: %s\n", prompt_file); return 1; }
            std::ostringstream ss; ss << pf.rdbuf();
            std::string prompt = ss.str();
            fprintf(stderr, "✅ 프롬프트: %zu chars\n", prompt.size());

            llama_backend_init();
            llama_model_params mparams = llama_model_default_params();
            mparams.use_mmap = true;
            llama_model* model = llama_model_load_from_file(model_path, mparams);
            if (!model) { fprintf(stderr, "❌ 모델 로드 실패: %s\n", model_path); llama_backend_free(); return 1; }

            llama_context_params cparams = llama_context_default_params();
            cparams.n_ctx          = n_ctx;
            cparams.n_batch        = 2048;
            cparams.n_ubatch       = 2048;
            cparams.rope_freq_base = rope_freq_base;
            cparams.flash_attn_type = LLAMA_FLASH_ATTN_TYPE_ENABLED;

            auto parse_type = [](const char* s) -> ggml_type {
              if (strcmp(s, "q8_0") == 0) return GGML_TYPE_Q8_0;
              if (strcmp(s, "q4_0") == 0) return GGML_TYPE_Q4_0;
              if (strcmp(s, "f16")  == 0) return GGML_TYPE_F16;
              return GGML_TYPE_F16;
            };
            cparams.type_k = parse_type(ck);
            cparams.type_v = parse_type(cv);

            llama_context* ctx = llama_init_from_model(model, cparams);
            if (!ctx) { fprintf(stderr, "❌ 컨텍스트 초기화 실패\n"); llama_model_free(model); llama_backend_free(); return 1; }
            fprintf(stderr, "✅ 컨텍스트 초기화 완료 (n_ctx=%d)\n", n_ctx);

            const llama_vocab* vocab = llama_model_get_vocab(model);
            std::vector<llama_token> tokens(n_ctx);
            int n_tokens = llama_tokenize(vocab, prompt.c_str(), (int)prompt.size(),
                                          tokens.data(), (int)tokens.size(), true, true);
            if (n_tokens < 0) { fprintf(stderr, "❌ 토크나이즈 실패\n"); llama_free(ctx); llama_model_free(model); llama_backend_free(); return 1; }
            tokens.resize(n_tokens);
            fprintf(stderr, "✅ 토큰 수: %d\n", n_tokens);

            llama_batch batch = llama_batch_get_one(tokens.data(), n_tokens);
            if (llama_decode(ctx, batch) != 0) { fprintf(stderr, "❌ prefill 실패\n"); llama_free(ctx); llama_model_free(model); llama_backend_free(); return 1; }
            fprintf(stderr, "✅ prefill 완료\n");

            if (!llama_state_save_file(ctx, output_bin, tokens.data(), n_tokens)) {
              fprintf(stderr, "❌ KV 저장 실패: %s\n", output_bin);
              llama_free(ctx); llama_model_free(model); llama_backend_free(); return 1;
            }
            fprintf(stderr, "✅ KV 저장 완료: %s\n", output_bin);

            llama_free(ctx); llama_model_free(model); llama_backend_free();
            return 0;
          }
          EOF

          cat << 'EOF' > examples/kv-prefill/CMakeLists.txt
          add_executable(kv-prefill kv-prefill.cpp)
          target_link_libraries(kv-prefill PRIVATE llama ${CMAKE_THREAD_LIBS_INIT})
          target_include_directories(kv-prefill PRIVATE
            ${CMAKE_SOURCE_DIR}/include
            ${CMAKE_SOURCE_DIR}/ggml/include
            ${CMAKE_SOURCE_DIR}/src
          )
          install(TARGETS kv-prefill RUNTIME)
          EOF

          echo 'add_subdirectory(examples/kv-prefill)' >> CMakeLists.txt

          cmake -B build \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DGGML_NATIVE=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j$(nproc) --target kv-prefill

          mkdir -p ../llama_build/bin
          cp build/bin/kv-prefill ../llama_build/bin/
          echo "✅ kv-prefill 빌드 완료"

      - name: kv-prefill 권한 설정
        run: chmod +x llama_build/bin/kv-prefill

      # ── 2. 모델 다운로드 ─────────────────────────────────────
      - name: 모델 캐시 확인
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/google_gemma-3n-E2B-it-Q4_K_M.gguf
          key: model-google_gemma-3n-E2B-it-Q4_K_M.gguf

      - name: 모델 다운로드
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L \
            -H "User-Agent: RPcore-App/3.0" \
            "https://huggingface.co/bartowski/google_gemma-3n-E2B-it-GGUF/resolve/main/google_gemma-3n-E2B-it-Q4_K_M.gguf" \
            -o "models/google_gemma-3n-E2B-it-Q4_K_M.gguf"
          echo "✅ E2B 모델 다운로드 완료"

      # ── 3. 챕터 목록 조회 ────────────────────────────────────
      - name: 챕터 목록 가져오기
        id: chapters
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          RESPONSE=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt")
          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "❌ 스토리 없음: $STORY_ID"; exit 1
          fi
          CHAPTERS=$(echo "$RESPONSE" | jq -r '[.chapters[].chapterId] | @json')
          TOTAL=$(echo "$RESPONSE" | jq '.chapters | length')
          echo "chapters=$CHAPTERS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "✅ 챕터 ${TOTAL}개 발견 (E2B)"

      # ── 4. 코어 목록 조회 ────────────────────────────────────
      - name: 코어 목록 가져오기
        id: cores
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          RESPONSE=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-cores")
          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "cores=[]" >> $GITHUB_OUTPUT
            echo "total_cores=0" >> $GITHUB_OUTPUT
            echo "⚠️  코어 없음 (스킵)"
          else
            CORES=$(echo "$RESPONSE" | jq -r '[.cores[].index] | @json')
            TOTAL=$(echo "$RESPONSE" | jq '.cores | length')
            echo "cores=$CORES" >> $GITHUB_OUTPUT
            echo "total_cores=$TOTAL" >> $GITHUB_OUTPUT
            echo "✅ 코어 ${TOTAL}개 발견"
          fi

      # ── 5. 챕터별 KV 생성 & 업로드 ──────────────────────────
      - name: 챕터 KV 생성 및 업로드 [E2B]
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          MODEL_ID="${{ env.MODEL_ID }}"
          MODEL_FILE="models/google_gemma-3n-E2B-it-Q4_K_M.gguf"
          CHAPTERS='${{ steps.chapters.outputs.chapters }}'
          KV_PREFILL="llama_build/bin/kv-prefill"

          echo "════════════════════════════════════"
          echo "스토리: $STORY_ID | 모델: $MODEL_ID"
          echo "════════════════════════════════════"

          SUCCESS=0
          FAIL=0

          for CH_ID in $(echo "$CHAPTERS" | jq -r '.[]'); do
            echo ""
            echo "── 챕터: $CH_ID ─────────────────────"

            EXISTING=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv/$CH_ID?modelId=$MODEL_ID" \
              | jq -r '.exists // false')
            if [ "$EXISTING" = "true" ]; then
              echo "  ⏭  이미 존재 — 스킵"
              SUCCESS=$((SUCCESS + 1))
              continue
            fi

            PROMPT_JSON=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt?chapterId=$CH_ID")
            PROMPT=$(echo "$PROMPT_JSON" | jq -r '.prompt')
            TOKEN_EST=$(echo "$PROMPT_JSON" | jq -r '.tokenEstimate // 0')
            echo "  [1/4] 프롬프트 수신 (~${TOKEN_EST} 토큰)"

            OUT_BIN="/tmp/kv_${STORY_ID}_${CH_ID}_e2b.bin"
            PROMPT_FILE="/tmp/prompt_${CH_ID}_e2b.txt"
            echo "$PROMPT" > "$PROMPT_FILE"

            echo "  [2/4] kv-prefill 실행..."
            "$KV_PREFILL" \
              "$MODEL_FILE" \
              "$PROMPT_FILE" \
              "$OUT_BIN" \
              "${{ env.N_CTX }}" \
              "${{ env.ROPE_FREQ_BASE }}" \
              "${{ env.CACHE_TYPE_K }}" \
              "${{ env.CACHE_TYPE_V }}" \
              "${{ env.N_KEEP }}"

            if [ ! -f "$OUT_BIN" ] || [ ! -s "$OUT_BIN" ]; then
              echo "  ❌ KV 생성 실패"
              FAIL=$((FAIL + 1))
              continue
            fi

            BIN_KB=$(( $(wc -c < "$OUT_BIN") / 1024 ))
            echo "  [3/4] bin 생성: ${BIN_KB} KB"
            echo "  [4/4] 업로드..."

            python3 << PYEOF
          import os, sys, json, hashlib, hmac, datetime, uuid
          import urllib.request, urllib.error
          from urllib.parse import urlencode

          story_id      = "${STORY_ID}"
          ch_id         = "${CH_ID}"
          model_id      = "${MODEL_ID}"
          out_bin       = "${OUT_BIN}"
          account_id    = "${{ vars.CF_ACCOUNT_ID }}"
          d1_db_id      = "${{ vars.CF_D1_DB_ID }}"
          api_token     = "${{ secrets.CF_API_TOKEN }}"
          r2_access_key = "${{ secrets.R2_ACCESS_KEY_ID }}"
          r2_secret_key = "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          r2_bucket     = "${{ secrets.R2_BUCKET_NAME }}"
          kv_version    = "${{ env.KV_VERSION }}"

          with open(out_bin, "rb") as f:
              raw = f.read()

          r2_key = f"kv_cache/{story_id}/{ch_id}_{model_id}.bin"

          def sha256hex(data):
              if isinstance(data, str): data = data.encode()
              return hashlib.sha256(data).hexdigest()

          def hmac_sha256(key, msg):
              if isinstance(msg, str): msg = msg.encode()
              return hmac.new(key if isinstance(key, bytes) else key.encode(), msg, hashlib.sha256).digest()

          def get_signing_key(secret, datestamp, region, service):
              k = hmac_sha256(f"AWS4{secret}", datestamp)
              k = hmac_sha256(k, region)
              k = hmac_sha256(k, service)
              return hmac_sha256(k, "aws4_request")

          now = datetime.datetime.now(datetime.timezone.utc)
          datestamp = now.strftime("%Y%m%d")
          timestamp = now.strftime("%Y%m%dT%H%M%SZ")
          region, service = "auto", "s3"
          host = f"{r2_bucket}.{account_id}.r2.cloudflarestorage.com"
          credential_scope = f"{datestamp}/{region}/{service}/aws4_request"
          params = sorted([
              ("X-Amz-Algorithm", "AWS4-HMAC-SHA256"),
              ("X-Amz-Credential", f"{r2_access_key}/{credential_scope}"),
              ("X-Amz-Date", timestamp),
              ("X-Amz-Expires", "3600"),
              ("X-Amz-SignedHeaders", "host"),
          ])
          qs = urlencode(params)
          canonical = "\n".join(["PUT", f"/{r2_key}", qs, f"host:{host}\n", "host", "UNSIGNED-PAYLOAD"])
          string_to_sign = "\n".join(["AWS4-HMAC-SHA256", timestamp, credential_scope, sha256hex(canonical)])
          signing_key = get_signing_key(r2_secret_key, datestamp, region, service)
          signature = hmac.new(signing_key, string_to_sign.encode(), hashlib.sha256).hexdigest()
          presigned_url = f"https://{host}/{r2_key}?{qs}&X-Amz-Signature={signature}"

          req = urllib.request.Request(presigned_url, data=raw,
              headers={"Content-Type": "application/octet-stream"}, method="PUT")
          try:
              with urllib.request.urlopen(req) as res:
                  if res.status not in (200, 204):
                      print(f"  ❌ R2 업로드 실패: {res.status}", file=sys.stderr); sys.exit(1)
          except urllib.error.HTTPError as e:
              print(f"  ❌ R2 업로드 실패: HTTP {e.code} | {e.read().decode()[:200]}", file=sys.stderr); sys.exit(1)

          sql = (
              "INSERT INTO story_kv_cache (id, story_id, chapter_id, model_id, llama_rn_version, r2_key) "
              "VALUES (?, ?, ?, ?, ?, ?) "
              "ON CONFLICT(story_id, chapter_id, model_id) DO UPDATE SET "
              "r2_key=excluded.r2_key, llama_rn_version=excluded.llama_rn_version, created_at=datetime('now')"
          )
          payload = json.dumps({"sql": sql, "params": [str(uuid.uuid4()), story_id, ch_id, model_id, kv_version, r2_key]}).encode()
          d1_req = urllib.request.Request(
              f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database/{d1_db_id}/query",
              data=payload,
              headers={"Authorization": f"Bearer {api_token}", "Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(d1_req) as res:
                  body = json.loads(res.read())
                  if body.get("success"):
                      print(f"  ✅ 업로드 완료: {r2_key}")
                  else:
                      print(f"  ❌ D1 등록 실패: {body}", file=sys.stderr); sys.exit(1)
          except urllib.error.HTTPError as e:
              print(f"  ❌ D1 API 실패: HTTP {e.code} | {e.read().decode()[:200]}", file=sys.stderr); sys.exit(1)
          PYEOF

            if [ $? -ne 0 ]; then FAIL=$((FAIL + 1)); else SUCCESS=$((SUCCESS + 1)); fi
            rm -f "$OUT_BIN" "$PROMPT_FILE"
          done

          echo ""
          echo "════════════════════════════════════"
          echo "[E2B] 챕터 완료: 성공 ${SUCCESS}개 / 실패 ${FAIL}개"
          echo "════════════════════════════════════"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi
