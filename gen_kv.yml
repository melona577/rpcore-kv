name: KV Cache 생성

# ═══════════════════════════════════════════════════════════════
# 트리거:
#   1. 스토리 승인 시 → Worker가 자동 호출
#   2. 수동 실행 (GitHub Actions 탭에서 직접)
# ═══════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: '스토리 ID'
        required: true
      model_id:
        description: '모델 ID'
        required: true
        default: 'gemma-3n-e2b'
        type: choice
        options:
          - gemma-3n-e2b
          - gemma-3-1b-qat

env:
  # ── 앱 llama_jni.cpp 와 반드시 동일 ──────────────────────────
  CACHE_TYPE_K: q8_0       # cp.type_k = GGML_TYPE_Q8_0
  CACHE_TYPE_V: q4_0       # cp.type_v = GGML_TYPE_Q4_0
  N_CTX: 2048              # G.n_ctx = 2048
  KV_VERSION: "2"          # KVCacheManager.ts LLAMA_RN_VERSION

jobs:
  generate-kv:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 0. 변수 준비 ────────────────────────────────────────
      - name: 변수 설정
        id: vars
        run: |
          echo "story_id=${{ github.event.inputs.story_id }}" >> $GITHUB_OUTPUT
          echo "model_id=${{ github.event.inputs.model_id }}" >> $GITHUB_OUTPUT

          # 모델별 HuggingFace 경로 설정
          if [ "${{ github.event.inputs.model_id }}" = "gemma-3n-e2b" ]; then
            echo "hf_repo=unsloth/gemma-3n-E2B-it-GGUF" >> $GITHUB_OUTPUT
            echo "hf_file=gemma-3n-E2B-it-IQ4_NL.gguf" >> $GITHUB_OUTPUT
          else
            echo "hf_repo=stduhpf/google-gemma-3-1b-it-qat-q4_0-gguf-small" >> $GITHUB_OUTPUT
            echo "hf_file=gemma-3-1b-it-q4_0_s.gguf" >> $GITHUB_OUTPUT
          fi

      # ── 1. llama.cpp 클론 (캐시) ────────────────────────────
      # 캐시 키: llama.cpp 특정 커밋 해시 기준
      # → 앱과 동일한 버전 유지 (secrets.LLAMA_CPP_HASH 에 저장)
      - name: llama.cpp 캐시 확인
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: llama_build/bin/llama-cli
          key: llama-cli-${{ secrets.LLAMA_CPP_HASH }}-ubuntu

      - name: llama.cpp 빌드
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ggml-org/llama.cpp llama_src
          cd llama_src
          git checkout ${{ secrets.LLAMA_CPP_HASH }}
          cmake -B build \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DGGML_NATIVE=OFF
          cmake --build build --target llama-cli -j$(nproc)
          mkdir -p ../llama_build/bin
          cp build/bin/llama-cli ../llama_build/bin/
          echo "✅ llama-cli 빌드 완료"

      - name: llama-cli 권한 설정
        run: chmod +x llama_build/bin/llama-cli

      # ── 2. 모델 다운로드 (캐시) ─────────────────────────────
      # 캐시 키: 모델 파일명 기준 (파일 바뀌면 자동 갱신)
      - name: 모델 캐시 확인
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/${{ steps.vars.outputs.hf_file }}
          key: model-${{ steps.vars.outputs.hf_file }}

      - name: 모델 다운로드
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          pip install -q huggingface_hub
          huggingface-cli download \
            ${{ steps.vars.outputs.hf_repo }} \
            ${{ steps.vars.outputs.hf_file }} \
            --local-dir models
          echo "✅ 모델 다운로드 완료"

      # ── 3. 챕터 목록 조회 ───────────────────────────────────
      - name: 챕터 목록 가져오기
        id: chapters
        run: |
          STORY_ID="${{ steps.vars.outputs.story_id }}"
          RESPONSE=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt")

          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "❌ 스토리 없음: $STORY_ID"
            exit 1
          fi

          # 챕터 ID 목록을 JSON 배열로 추출
          CHAPTERS=$(echo "$RESPONSE" | jq -r '[.chapters[].chapterId] | @json')
          echo "chapters=$CHAPTERS" >> $GITHUB_OUTPUT
          TOTAL=$(echo "$RESPONSE" | jq '.chapters | length')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "✅ 챕터 $TOTAL개 발견"

      # ── 4. 챕터별 KV 생성 & 업로드 ─────────────────────────
      - name: KV 생성 및 업로드
        run: |
          STORY_ID="${{ steps.vars.outputs.story_id }}"
          MODEL_ID="${{ steps.vars.outputs.model_id }}"
          MODEL_FILE="models/${{ steps.vars.outputs.hf_file }}"
          CHAPTERS='${{ steps.chapters.outputs.chapters }}'
          LLAMA_CLI="llama_build/bin/llama-cli"

          echo "════════════════════════════════════"
          echo "스토리: $STORY_ID | 모델: $MODEL_ID"
          echo "════════════════════════════════════"

          SUCCESS=0
          FAIL=0

          # JSON 배열 순회
          for CH_ID in $(echo "$CHAPTERS" | jq -r '.[]'); do
            echo ""
            echo "── 챕터: $CH_ID ─────────────────────"

            # 이미 KV 있는지 확인 (중복 생성 방지)
            EXISTING=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv/$CH_ID" \
              | jq -r '.exists // false')
            if [ "$EXISTING" = "true" ]; then
              echo "  ⏭  이미 존재 — 스킵"
              SUCCESS=$((SUCCESS + 1))
              continue
            fi

            # 1. 프롬프트 가져오기
            PROMPT_JSON=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt?chapterId=$CH_ID")
            PROMPT=$(echo "$PROMPT_JSON" | jq -r '.prompt')
            TOKEN_EST=$(echo "$PROMPT_JSON" | jq -r '.tokenEstimate // 0')
            echo "  [1/4] 프롬프트 수신 (~${TOKEN_EST} 토큰)"

            # 2. KV prefill
            # ⚠️ 이 파라미터가 앱 llama_jni.cpp 와 완전히 동일해야 함
            OUT_BIN="/tmp/kv_${STORY_ID}_${CH_ID}.bin"
            PROMPT_FILE="/tmp/prompt_${CH_ID}.txt"
            echo "$PROMPT" > "$PROMPT_FILE"

            echo "  [2/4] llama-cli KV prefill..."
            "$LLAMA_CLI" \
              -m "$MODEL_FILE" \
              --ctx-size ${{ env.N_CTX }} \
              --cache-type-k ${{ env.CACHE_TYPE_K }} \
              --cache-type-v ${{ env.CACHE_TYPE_V }} \
              --no-flash-attn \
              --threads $(nproc) \
              --file "$PROMPT_FILE" \
              --prompt-cache "$OUT_BIN" \
              --prompt-cache-all \
              -n 1 \
              --log-disable 2>/dev/null

            if [ ! -f "$OUT_BIN" ] || [ ! -s "$OUT_BIN" ]; then
              echo "  ❌ KV 생성 실패"
              FAIL=$((FAIL + 1))
              continue
            fi

            BIN_KB=$(( $(wc -c < "$OUT_BIN") / 1024 ))
            echo "  [3/4] bin 생성: ${BIN_KB} KB"

            # 3. base64 & 업로드
            echo "  [4/4] R2 업로드..."
            KV_B64=$(base64 -w 0 "$OUT_BIN")

            UPLOAD=$(curl -sf -X POST \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-upload" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_KV_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"chapterId\":      \"$CH_ID\",
                \"kvBase64\":       \"$KV_B64\",
                \"modelId\":        \"$MODEL_ID\",
                \"llamaRnVersion\": \"${{ env.KV_VERSION }}\"
              }")

            OK=$(echo "$UPLOAD" | jq -r '.success // false')
            if [ "$OK" = "true" ]; then
              R2_KEY=$(echo "$UPLOAD" | jq -r '.r2Key')
              echo "  ✅ 업로드 완료: $R2_KEY"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ 업로드 실패: $UPLOAD"
              FAIL=$((FAIL + 1))
            fi

            rm -f "$OUT_BIN" "$PROMPT_FILE"
          done

          echo ""
          echo "════════════════════════════════════"
          echo "완료: 성공 ${SUCCESS}개 / 실패 ${FAIL}개"
          echo "════════════════════════════════════"

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi
