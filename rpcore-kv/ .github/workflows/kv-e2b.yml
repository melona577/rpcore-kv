name: KV Cache 생성 [E2B 전담]

# ═══════════════════════════════════════════════════════════════
# 📍 본인 GitHub 계정 repo에 등록
#    담당 모델: gemma-3n-e2b-reasoning (무거운 모델)
# ═══════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: '스토리 ID'
        required: true

env:
  CACHE_TYPE_K: q8_0
  CACHE_TYPE_V: q4_0
  KV_VERSION: "4"
  N_KEEP: 512
  ROPE_FREQ_BASE: 10000

jobs:
  generate-kv-e2b:
    name: "KV 생성 [gemma-3n-e2b-reasoning]"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. llama.cpp 빌드 (캐시) ────────────────────────────
      - name: llama.cpp 캐시 확인
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: llama_build/bin/llama-cli
          key: llama-cli-${{ secrets.LLAMA_CPP_HASH }}-ubuntu

      - name: llama.cpp 빌드
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ggml-org/llama.cpp llama_src
          cd llama_src
          git checkout ${{ secrets.LLAMA_CPP_HASH }}
          cmake -B build \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DGGML_NATIVE=OFF
          cmake --build build --target llama-cli -j$(nproc)
          mkdir -p ../llama_build/bin
          cp build/bin/llama-cli ../llama_build/bin/
          echo "✅ llama-cli 빌드 완료"

      - name: llama-cli 권한 설정
        run: chmod +x llama_build/bin/llama-cli

      # ── 2. 모델 다운로드 (캐시) ─────────────────────────────
      - name: 모델 캐시 확인
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/gemma-3n-E2B-it-Q4_K_M.gguf
          key: model-gemma-3n-E2B-it-Q4_K_M.gguf

      - name: 모델 다운로드
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          pip install -q huggingface_hub
          huggingface-cli download \
            unsloth/gemma-3n-E2B-it-GGUF \
            gemma-3n-E2B-it-Q4_K_M.gguf \
            --local-dir models
          echo "✅ E2B 모델 다운로드 완료"

      # ── 3. 챕터 목록 조회 ───────────────────────────────────
      - name: 챕터 목록 가져오기
        id: chapters
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          RESPONSE=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt")

          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "❌ 스토리 없음: $STORY_ID"
            exit 1
          fi

          CHAPTERS=$(echo "$RESPONSE" | jq -r '[.chapters[].chapterId] | @json')
          TOTAL=$(echo "$RESPONSE" | jq '.chapters | length')
          echo "chapters=$CHAPTERS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "✅ 챕터 ${TOTAL}개 발견 (E2B)"

      # ── 4. 챕터별 KV 생성 & 업로드 ─────────────────────────
      - name: KV 생성 및 업로드 [E2B]
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          MODEL_ID="gemma-3n-e2b-reasoning"
          MODEL_FILE="models/gemma-3n-E2B-it-Q4_K_M.gguf"
          N_CTX="4096"
          CHAPTERS='${{ steps.chapters.outputs.chapters }}'
          LLAMA_CLI="llama_build/bin/llama-cli"

          echo "════════════════════════════════════"
          echo "스토리: $STORY_ID | 모델: $MODEL_ID"
          echo "════════════════════════════════════"

          SUCCESS=0
          FAIL=0

          for CH_ID in $(echo "$CHAPTERS" | jq -r '.[]'); do
            echo ""
            echo "── 챕터: $CH_ID ─────────────────────"

            # 이미 존재하면 스킵
            EXISTING=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv/$CH_ID?modelId=$MODEL_ID" \
              | jq -r '.exists // false')
            if [ "$EXISTING" = "true" ]; then
              echo "  ⏭  이미 존재 — 스킵"
              SUCCESS=$((SUCCESS + 1))
              continue
            fi

            # 프롬프트 가져오기
            PROMPT_JSON=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt?chapterId=$CH_ID")
            PROMPT=$(echo "$PROMPT_JSON" | jq -r '.prompt')
            TOKEN_EST=$(echo "$PROMPT_JSON" | jq -r '.tokenEstimate // 0')
            echo "  [1/4] 프롬프트 수신 (~${TOKEN_EST} 토큰)"

            # KV prefill
            OUT_BIN="/tmp/kv_${STORY_ID}_${CH_ID}_e2b.bin"
            PROMPT_FILE="/tmp/prompt_${CH_ID}_e2b.txt"
            echo "$PROMPT" > "$PROMPT_FILE"

            echo "  [2/4] llama-cli KV prefill..."
            "$LLAMA_CLI" \
              -m "$MODEL_FILE" \
              --ctx-size "$N_CTX" \
              --cache-type-k ${{ env.CACHE_TYPE_K }} \
              --cache-type-v ${{ env.CACHE_TYPE_V }} \
              --flash-attn \
              --keep ${{ env.N_KEEP }} \
              --rope-freq-base ${{ env.ROPE_FREQ_BASE }} \
              --threads $(nproc) \
              --file "$PROMPT_FILE" \
              --prompt-cache "$OUT_BIN" \
              --prompt-cache-all \
              -n 0 \
              --log-disable 2>/dev/null

            if [ ! -f "$OUT_BIN" ] || [ ! -s "$OUT_BIN" ]; then
              echo "  ❌ KV 생성 실패"
              FAIL=$((FAIL + 1))
              continue
            fi

            BIN_KB=$(( $(wc -c < "$OUT_BIN") / 1024 ))
            echo "  [3/4] bin 생성: ${BIN_KB} KB"

            # base64 & 업로드
            echo "  [4/4] 업로드..."
            KV_B64=$(base64 -w 0 "$OUT_BIN")

            UPLOAD=$(curl -sf -X POST \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-upload" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_KV_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"chapterId\":      \"$CH_ID\",
                \"kvBase64\":       \"$KV_B64\",
                \"modelId\":        \"$MODEL_ID\",
                \"llamaRnVersion\": \"${{ env.KV_VERSION }}\"
              }")

            OK=$(echo "$UPLOAD" | jq -r '.success // false')
            if [ "$OK" = "true" ]; then
              R2_KEY=$(echo "$UPLOAD" | jq -r '.r2Key')
              echo "  ✅ 업로드 완료: $R2_KEY"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ 업로드 실패: $UPLOAD"
              FAIL=$((FAIL + 1))
            fi

            rm -f "$OUT_BIN" "$PROMPT_FILE"
          done

          echo ""
          echo "════════════════════════════════════"
          echo "[E2B] 완료: 성공 ${SUCCESS}개 / 실패 ${FAIL}개"
          echo "════════════════════════════════════"

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi
