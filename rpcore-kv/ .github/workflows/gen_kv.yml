name: KV Cache 생성

# ═══════════════════════════════════════════════════════════════
# 트리거:
#   1. 스토리 승인 시 → Worker가 자동 호출
#   2. 수동 실행 (GitHub Actions 탭에서 직접)
#
# 동작:
#   스토리 1개 → 1B 모델 / E2B 모델 동시 병렬 생성
# ═══════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: '스토리 ID'
        required: true

env:
  CACHE_TYPE_K: q8_0
  CACHE_TYPE_V: q4_0
  KV_VERSION: "2"

jobs:
  generate-kv:
    name: "KV 생성 [${{ matrix.model_id }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # ── 두 모델 병렬 실행 ────────────────────────────────────
    strategy:
      fail-fast: false   # 한 모델 실패해도 다른 모델은 계속
      matrix:
        include:
          - model_id: gemma-3-1b-qat
            hf_repo: stduhpf/google-gemma-3-1b-it-qat-q4_0-gguf-small
            hf_file: gemma-3-1b-it-q4_0_s.gguf
            # DeviceProfiler PARAMS_1B.low.context = 4096 (앱 최솟값)
            # KV 캐시는 생성 n_ctx <= 로드 n_ctx 여야 함 → 최솟값 고정
            n_ctx: 4096

          - model_id: gemma-3n-e2b
            hf_repo: unsloth/gemma-3n-E2B-it-GGUF
            hf_file: gemma-3n-E2B-it-IQ4_NL.gguf
            # E2B ~1.5GB → sizeMB<=1500 → PARAMS_1B 표 적용 → 최솟값 4096
            n_ctx: 4096

    steps:
      # ── 1. llama.cpp 빌드 (캐시) ────────────────────────────
      - name: llama.cpp 캐시 확인
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: llama_build/bin/llama-cli
          key: llama-cli-${{ secrets.LLAMA_CPP_HASH }}-ubuntu

      - name: llama.cpp 빌드
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ggml-org/llama.cpp llama_src
          cd llama_src
          git checkout ${{ secrets.LLAMA_CPP_HASH }}
          cmake -B build \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DGGML_NATIVE=OFF
          cmake --build build --target llama-cli -j$(nproc)
          mkdir -p ../llama_build/bin
          cp build/bin/llama-cli ../llama_build/bin/
          echo "✅ llama-cli 빌드 완료"

      - name: llama-cli 권한 설정
        run: chmod +x llama_build/bin/llama-cli

      # ── 2. 모델 다운로드 (캐시) ─────────────────────────────
      - name: 모델 캐시 확인
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/${{ matrix.hf_file }}
          key: model-${{ matrix.hf_file }}

      - name: 모델 다운로드
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          pip install -q huggingface_hub
          huggingface-cli download \
            ${{ matrix.hf_repo }} \
            ${{ matrix.hf_file }} \
            --local-dir models
          echo "✅ 모델 다운로드 완료: ${{ matrix.model_id }}"

      # ── 3. 챕터 목록 조회 ───────────────────────────────────
      - name: 챕터 목록 가져오기
        id: chapters
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          RESPONSE=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt")

          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "❌ 스토리 없음: $STORY_ID"
            exit 1
          fi

          CHAPTERS=$(echo "$RESPONSE" | jq -r '[.chapters[].chapterId] | @json')
          TOTAL=$(echo "$RESPONSE" | jq '.chapters | length')
          echo "chapters=$CHAPTERS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "✅ 챕터 ${TOTAL}개 발견 (모델: ${{ matrix.model_id }})"

      # ── 4. 챕터별 KV 생성 & 업로드 ─────────────────────────
      - name: KV 생성 및 업로드
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          MODEL_ID="${{ matrix.model_id }}"
          MODEL_FILE="models/${{ matrix.hf_file }}"
          N_CTX="${{ matrix.n_ctx }}"
          CHAPTERS='${{ steps.chapters.outputs.chapters }}'
          LLAMA_CLI="llama_build/bin/llama-cli"

          echo "════════════════════════════════════"
          echo "스토리: $STORY_ID | 모델: $MODEL_ID | N_CTX: $N_CTX"
          echo "════════════════════════════════════"

          SUCCESS=0
          FAIL=0

          for CH_ID in $(echo "$CHAPTERS" | jq -r '.[]'); do
            echo ""
            echo "── 챕터: $CH_ID ─────────────────────"

            # 이미 이 모델용 KV가 있으면 스킵
            EXISTING=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv/$CH_ID?modelId=$MODEL_ID" \
              | jq -r '.exists // false')
            if [ "$EXISTING" = "true" ]; then
              echo "  ⏭  이미 존재 ($MODEL_ID) — 스킵"
              SUCCESS=$((SUCCESS + 1))
              continue
            fi

            # 1. 프롬프트 가져오기
            PROMPT_JSON=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt?chapterId=$CH_ID")
            PROMPT=$(echo "$PROMPT_JSON" | jq -r '.prompt')
            TOKEN_EST=$(echo "$PROMPT_JSON" | jq -r '.tokenEstimate // 0')
            echo "  [1/4] 프롬프트 수신 (~${TOKEN_EST} 토큰)"

            # 2. KV prefill
            OUT_BIN="/tmp/kv_${STORY_ID}_${CH_ID}_${MODEL_ID}.bin"
            PROMPT_FILE="/tmp/prompt_${CH_ID}_${MODEL_ID}.txt"
            echo "$PROMPT" > "$PROMPT_FILE"

            echo "  [2/4] llama-cli KV prefill (N_CTX=$N_CTX)..."
            "$LLAMA_CLI" \
              -m "$MODEL_FILE" \
              --ctx-size "$N_CTX" \
              --cache-type-k ${{ env.CACHE_TYPE_K }} \
              --cache-type-v ${{ env.CACHE_TYPE_V }} \
              --no-flash-attn \
              --threads $(nproc) \
              --file "$PROMPT_FILE" \
              --prompt-cache "$OUT_BIN" \
              --prompt-cache-all \
              -n 1 \
              --log-disable 2>/dev/null

            if [ ! -f "$OUT_BIN" ] || [ ! -s "$OUT_BIN" ]; then
              echo "  ❌ KV 생성 실패"
              FAIL=$((FAIL + 1))
              continue
            fi

            BIN_KB=$(( $(wc -c < "$OUT_BIN") / 1024 ))
            echo "  [3/4] bin 생성: ${BIN_KB} KB"

            # 3. base64 & 업로드
            echo "  [4/4] R2 업로드..."
            KV_B64=$(base64 -w 0 "$OUT_BIN")

            UPLOAD=$(curl -sf -X POST \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-upload" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_KV_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"chapterId\":      \"$CH_ID\",
                \"kvBase64\":       \"$KV_B64\",
                \"modelId\":        \"$MODEL_ID\",
                \"llamaRnVersion\": \"${{ env.KV_VERSION }}\"
              }")

            OK=$(echo "$UPLOAD" | jq -r '.success // false')
            if [ "$OK" = "true" ]; then
              R2_KEY=$(echo "$UPLOAD" | jq -r '.r2Key')
              echo "  ✅ 업로드 완료: $R2_KEY"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ 업로드 실패: $UPLOAD"
              FAIL=$((FAIL + 1))
            fi

            rm -f "$OUT_BIN" "$PROMPT_FILE"
          done

          echo ""
          echo "════════════════════════════════════"
          echo "[$MODEL_ID] 완료: 성공 ${SUCCESS}개 / 실패 ${FAIL}개"
          echo "════════════════════════════════════"

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi
